  <body>
    <div id="root"></div>

    <!--
      The MSG91 OTP browser widget was loaded here in an earlier iteration
      to drive phone-OTP via the widget's window.sendOtp / verifyOtp.
      We have since moved SMS to a Supabase Edge Function that talks to
      MSG91's Flow API directly (server-side OTP generation, no browser
      widget required). The dead loader was downloading ~800 KB of
      otp-provider.js on every page and logging "Cannot read properties
      of undefined (reading 'exposeMethods')" four times to the console.

      If we ever bring the widget back (paid invisible-captcha tier or
      a different UX), the integration lives in src/lib/msg91-widget.ts
      and is one script tag away.
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
